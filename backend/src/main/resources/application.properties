server.port=5000

# Database configurations (MySQL with auto-create database support)
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:telehealth_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:${DB_USER:root}}
spring.datasource.password=${DB_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File uploads boundaries configuration (10MB limit)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom Security tokens configuration
jwt.secret=telehealthsecretkeyfortokenssecretvalueslongerthannormal
jwt.refresh.secret=telehealthrefreshsecretkeyfortokenssecretvalueslongerthannormal
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Stripe Payments API
stripe.api.key=sk_test_mockkeyfordevelopmentpayments
stripe.webhook.secret=whsec_mockwebhooksecretkey

# Cloudinary Storage settings
cloudinary.cloud-name=mock_cloudinary_cloud_name
cloudinary.api-key=mock_cloudinary_api_key
cloudinary.api-secret=mock_cloudinary_api_secret

# SMTP Email Configuration
spring.mail.host=smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=mock_smtp_user
spring.mail.password=mock_smtp_pass
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=no-reply@telehealthpro.com